name: Publish
on:
  push:
    tags:
      - "vdisable*"

jobs:
  "publish":
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v6
        with:
          version: 11
          cache: false
          run_install: true
      - name: Test
        run: |
          npm run test
      - name: Build
        run: |
          npm run build
      - name: Publish
        run: |
          npx publint
          npm publish
